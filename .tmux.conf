# ~/.dotfiles/.tmux.conf — tmux >= 3.2 (battlecat: 3.6)
# Radikal modern, kein Versions-Switching. Aeltere Hosts: alte Config aus git-History.

##### Terminal / Anti-Flicker (battlecat-erprobt — NICHT anfassen) #####
set  -g  default-terminal   "tmux-256color"
set  -ga terminal-overrides ",*:Tc"
set  -ga terminal-features  ",*:RGB"
set  -as terminal-features  ",*:sync"        # Synchronized Output gegen Flicker
set  -g  allow-passthrough  on
set  -s  escape-time        0
set  -g  focus-events       on

##### Core #####
set  -g  mouse              on
set  -g  history-limit      100000
set  -g  base-index         1
setw -g  pane-base-index    1
set  -g  renumber-windows   on               # keine Nummernluecken nach Window-Close
setw -g  aggressive-resize  on               # Laptop + WT mit versch. Groessen attached
set  -g  destroy-unattached off              # 24/7-Sessions ueberleben Detach
set  -as terminal-features  ",*:clipboard"
set  -s  set-clipboard      on               # OSC 52: Copy -> Windows-Clipboard, auch via SSH, kein X noetig

##### Prefix: Ctrl+a #####
unbind C-b
set -g prefix C-a
bind C-a last-window                          # C-a C-a = Fenster-Toggle
bind a   send-prefix                          # nested tmux (laptop-tmux -> ssh -> battlecat-tmux)

##### Splits & Windows — immer im aktuellen Pfad #####
bind '-' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind c   new-window      -c "#{pane_current_path}"

##### Window-Wechsel: Shift+Pfeil (User-Wahl 2026-06-12) #####
# Shift+Links/Rechts blaettert durch die Windows (= die von Orko gespawnten
# Loops orko:2/orko:3 …). -n = ohne prefix, geht sauber durch Windows Terminal.
# Shift+Hoch/Runter ist hier mit Pane-Up/Down belegt (sonst braechen sie).
bind -n S-Left  previous-window
bind -n S-Right next-window
bind -n S-Up    select-pane -U
bind -n S-Down  select-pane -D
# Builtin bleibt: prefix n/p, prefix <Zahl>, C-a C-a (last-window-Toggle).

##### Pane-Wechsel: prefix + hjkl (kollisionsfrei) #####
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

##### Window-Reorder: prefix < / > #####
bind -r '<' swap-window -d -t -1
bind -r '>' swap-window -d -t +1

##### Pane-Resize: prefix + Pfeil, repeatable #####
bind -r Left  resize-pane -L 5
bind -r Right resize-pane -R 5
bind -r Up    resize-pane -U 3
bind -r Down  resize-pane -D 3

##### Copy-Mode (vi) — Copy landet via OSC52 im System-Clipboard #####
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel

##### Reload #####
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

##### Statusbar — dezent #####
set  -g status-justify centre
set  -g status-style   bg=default,fg=white
set  -g status-left    " #S "
set  -g status-right   " #(cut -d' ' -f1 /proc/loadavg) %H:%M "
setw -g window-status-style         bg=colour240,fg=white
setw -g window-status-current-style bg=colour41,fg=black
setw -g window-status-separator     ' '

##### Smarte Window-Titel (Owner-Direktive 2026-06-15) #####
# Manuell gestartete Windows hießen alle "claude"/"bash" — nutzlos beim Wechsel.
# Helper setzt sprechende, kurze Titel (<proc>·<cwd>, max ~18 Zeichen).
# WICHTIG: vom Orko-Hub gespawnte Loop-Windows (@orko_locked=1) bleiben IDEMPOTENT +
# UNVERÄNDERBAR — der Helper fasst sie nie an (Hub targetiert per Window-Index).
setw -g automatic-rename off
set  -g allow-rename     off
set-hook -g after-new-window   'run-shell -b "~/.dotfiles/bin/tmux-smart-title.sh #{window_id}"'
set-hook -g after-split-window 'run-shell -b "~/.dotfiles/bin/tmux-smart-title.sh #{window_id}"'
set-hook -g pane-focus-in      'run-shell -b "~/.dotfiles/bin/tmux-smart-title.sh #{window_id}"'

##### Host-spezifische Overrides (optional, gewinnt — bleibt zuletzt) #####
source-file -q ~/.tmux.local.conf
